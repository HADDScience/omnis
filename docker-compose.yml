services:
  omnis-db:
    image: postgres:16-alpine
    container_name: omnis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnis
      POSTGRES_USER: omnis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnis_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - omnis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnis"]
      interval: 5s
      timeout: 5s
      retries: 5

  omnis:
    build: .
    container_name: omnis
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://omnis:${POSTGRES_PASSWORD:-omnis_dev_2026}@omnis-db:5432/omnis
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-hadd-omnis-secret-dev-2026}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      omnis-db:
        condition: service_healthy

volumes:
  omnis_pgdata:
